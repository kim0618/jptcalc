<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#3730A3"/>
    </linearGradient>
    <style>
      /* 큐브 1 — 우상단에서 좌하단으로 대각 + 회전 */
      @keyframes cube1 {
        0%   { transform: translate(28px, 3px)  rotate(0deg)   scale(1);   opacity: 0.9; }
        40%  { transform: translate(22px, 9px)  rotate(90deg)  scale(0.7); opacity: 0.6; }
        70%  { transform: translate(14px, 18px) rotate(160deg) scale(0.4); opacity: 0.3; }
        100% { transform: translate(28px, 3px)  rotate(360deg) scale(1);   opacity: 0.9; }
      }
      /* 큐브 2 — 좌상단에서 원형 궤도 */
      @keyframes cube2 {
        0%   { transform: translate(5px, 8px)  rotate(0deg)   scale(0.8); opacity: 0.7; }
        33%  { transform: translate(14px, 4px) rotate(120deg) scale(1.1); opacity: 0.9; }
        66%  { transform: translate(22px, 10px) rotate(240deg) scale(0.6); opacity: 0.5; }
        100% { transform: translate(5px, 8px)  rotate(360deg) scale(0.8); opacity: 0.7; }
      }
      /* 큐브 3 — 하단에서 위로 떠오르다 사라짐 */
      @keyframes cube3 {
        0%   { transform: translate(30px, 30px) rotate(0deg)   scale(1);   opacity: 0.8; }
        50%  { transform: translate(26px, 18px) rotate(180deg) scale(0.5); opacity: 0.4; }
        100% { transform: translate(30px, 30px) rotate(360deg) scale(1);   opacity: 0.8; }
      }
      /* 큐브 4 — 좌하단 작은 큐브 느리게 */
      @keyframes cube4 {
        0%   { transform: translate(6px, 28px)  rotate(0deg)   scale(0.7); opacity: 0.6; }
        50%  { transform: translate(12px, 32px) rotate(180deg) scale(1);   opacity: 0.9; }
        100% { transform: translate(6px, 28px)  rotate(360deg) scale(0.7); opacity: 0.6; }
      }
      /* 큐브 5 — 중앙 우측 빠르게 */
      @keyframes cube5 {
        0%   { transform: translate(32px, 16px) rotate(0deg)   scale(0.5); opacity: 0.5; }
        25%  { transform: translate(28px, 10px) rotate(90deg)  scale(0.9); opacity: 0.8; }
        75%  { transform: translate(34px, 24px) rotate(270deg) scale(0.6); opacity: 0.4; }
        100% { transform: translate(32px, 16px) rotate(360deg) scale(0.5); opacity: 0.5; }
      }

      .c1 { animation: cube1 3.8s ease-in-out infinite; }
      .c2 { animation: cube2 5.2s ease-in-out infinite; }
      .c3 { animation: cube3 4.5s ease-in-out infinite 0.8s; }
      .c4 { animation: cube4 6.1s ease-in-out infinite 1.5s; }
      .c5 { animation: cube5 2.9s ease-in-out infinite 0.3s; }
    </style>
  </defs>

  <!-- 배경 -->
  <rect width="40" height="40" rx="9" fill="url(#bg)"/>

  <!-- ── 큐브 1 (중간 크기) -->
  <g class="c1">
    <polygon points="0,-4  5,-1.5  5,3   0,5.5 -5,3   -5,-1.5" fill="white" opacity="0" />
    <polygon points="0,-4  5,-1.5  0,1  -5,-1.5" fill="white" opacity="0.95"/>
    <polygon points="5,-1.5  5,3  0,5.5  0,1"    fill="white" opacity="0.45"/>
    <polygon points="-5,-1.5 -5,3  0,5.5  0,1"   fill="white" opacity="0.65"/>
  </g>

  <!-- ── 큐브 2 (작은) -->
  <g class="c2">
    <polygon points="0,-2.5  3,-0.8  0,0.9  -3,-0.8"  fill="white" opacity="0.9"/>
    <polygon points="3,-0.8  3,2.2  0,3.9  0,0.9"     fill="white" opacity="0.4"/>
    <polygon points="-3,-0.8 -3,2.2  0,3.9  0,0.9"    fill="white" opacity="0.6"/>
  </g>

  <!-- ── 큐브 3 (중간) -->
  <g class="c3">
    <polygon points="0,-3  4,-1  0,1  -4,-1"   fill="white" opacity="0.85"/>
    <polygon points="4,-1  4,3  0,5  0,1"      fill="white" opacity="0.38"/>
    <polygon points="-4,-1 -4,3  0,5  0,1"     fill="white" opacity="0.58"/>
  </g>

  <!-- ── 큐브 4 (아주 작은) -->
  <g class="c4">
    <polygon points="0,-1.8  2.5,-0.5  0,0.8  -2.5,-0.5" fill="white" opacity="0.85"/>
    <polygon points="2.5,-0.5  2.5,1.8  0,3.1  0,0.8"    fill="white" opacity="0.4"/>
    <polygon points="-2.5,-0.5 -2.5,1.8  0,3.1  0,0.8"   fill="white" opacity="0.6"/>
  </g>

  <!-- ── 큐브 5 (작은) -->
  <g class="c5">
    <polygon points="0,-2  2.8,-0.6  0,0.8  -2.8,-0.6"  fill="white" opacity="0.8"/>
    <polygon points="2.8,-0.6  2.8,2  0,3.4  0,0.8"     fill="white" opacity="0.35"/>
    <polygon points="-2.8,-0.6 -2.8,2  0,3.4  0,0.8"    fill="white" opacity="0.55"/>
  </g>

  <!-- J 글자 — 중앙 고정, 얇고 선명하게 -->
  <text
    x="20" y="28"
    font-family="'Helvetica Neue','Arial',sans-serif"
    font-size="26"
    font-weight="200"
    fill="white"
    text-anchor="middle"
    letter-spacing="-0.5"
  >J</text>

</svg>
